# ============================================================
# Configuration de test - PostgreSQL via Testcontainers
# ============================================================
# Les propriétés datasource sont injectées dynamiquement par
# Testcontainers via @DynamicPropertySource dans la classe
# AbstractIntegrationTest. Pas besoin de les configurer ici.

# Hibernate crée le schéma automatiquement dans le conteneur de test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true


# JWT config pour les tests
jwt.secret=TestSecretKeyForIntegrationTests123456789012345678901234567890123456789012345678901234
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Désactiver l'envoi d'emails pendant les tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# Logging
logging.level.org.testcontainers=INFO
logging.level.com.sge.platforme_etude=DEBUG
logging.level.org.hibernate.SQL=DEBUG
