name: Platforme Etude CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend Spring Boot
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: platforme_etude_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d platforme_etude_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: 'maven'

      - name: Run backend tests and generate JaCoCo report
        working-directory: platforme_etude_backend
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/platforme_etude_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_MAIL_USERNAME: test@example.com
          SPRING_MAIL_PASSWORD: test-password
          JWT_SECRET: PlatformeEtudeTestSecretKey1234567890123456789012345678901234567890
        run: mvn clean verify

      - name: Analyze backend with SonarCloud
        working-directory: platforme_etude_backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  frontend:
    name: Frontend React Vite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'platforme_etude_frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: platforme_etude_frontend
        run: npm ci

      - name: Build frontend
        working-directory: platforme_etude_frontend
        run: npm run build

  docker:
    name: Docker Compose Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose config