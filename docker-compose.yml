services:

    frontend:
        build:
            context: ./platforme_etude_frontend
            dockerfile: Dockerfile.dev
        ports:
            - "5173:5173"
        volumes:
            - ./platforme_etude_frontend/src:/app/src
            - ./platforme_etude_frontend/public:/app/public
            - /app/node_modules
        environment:
            - VITE_API_URL=http://localhost:8080
        restart: unless-stopped
        depends_on:
            backend:
                condition: service_started

    backend:
        build: ./platforme_etude_backend
        ports:
            - "8080:8080"
        environment:
            - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/mydb
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=Yassbhr12
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy

    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: mydb
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: Yassbhr12
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    pgdata:
